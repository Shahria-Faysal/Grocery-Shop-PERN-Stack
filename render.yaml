services:
  - type: web
    name: grocery-shop-backend
    env: node
    plan: free
    region: oregon
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: JWT_SECRET
        sync: false
